name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  export-android:
    name: Android Export
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: sdkmanager "ndk;25.2.9519653"

      - name: Download Godot 4.4
        run: |
          wget -q https://github.com/godotengine/godot/releases/download/4.4-stable/Godot_v4.4-stable_linux.x86_64.zip -O godot.zip
          unzip -q godot.zip
          chmod +x Godot_v4.4-stable_linux.x86_64
          sudo mv Godot_v4.4-stable_linux.x86_64 /usr/local/bin/godot

      - name: Download Godot export templates
        run: |
          mkdir -p ~/.local/share/godot/export_templates/4.4.stable
          wget -q https://github.com/godotengine/godot/releases/download/4.4-stable/Godot_v4.4-stable_export_templates.tpz -O templates.tpz
          unzip -q templates.tpz -d templates_raw
          mv templates_raw/templates/* ~/.local/share/godot/export_templates/4.4.stable/
          rm -rf templates_raw templates.tpz

      - name: Generate debug keystore
        run: |
          keytool -genkey -v \
            -keystore ${{ github.workspace }}/debug.keystore \
            -storepass android -alias androiddebugkey -keypass android \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Import project
        run: |
          cd ${{ github.workspace }}
          timeout 60 godot --headless --import --quit-after 100 || true

      - name: Write Godot editor settings
        run: |
          mkdir -p ~/.config/godot
          printf '[gd_resource type="EditorSettings" format=3]\n[resource]\nexport/android/java_sdk_path = "%s"\nexport/android/android_sdk_path = "%s"\nexport/android/debug_keystore = "%s/debug.keystore"\nexport/android/debug_keystore_pass = "android"\nexport/android/debug_keystore_user = "androiddebugkey"\n' \
            "$JAVA_HOME" "$ANDROID_SDK_ROOT" "${{ github.workspace }}" \
            > ~/.config/godot/editor_settings-4.4.tres
          echo "--- Editor settings ---"
          cat ~/.config/godot/editor_settings-4.4.tres

      - name: Export APK
        run: |
          mkdir -p ${{ github.workspace }}/builds
          cd ${{ github.workspace }}
          godot --headless --export-debug "Android" builds/dungeoncrawler.apk 2>&1
          echo "--- Build result ---"
          ls -lh builds/ || echo "No files in builds/"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: dungeoncrawler-android-debug
          path: ${{ github.workspace }}/builds/dungeoncrawler.apk
          if-no-files-found: error
