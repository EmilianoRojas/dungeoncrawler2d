name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  export-android:
    name: Android Export
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.4

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup export templates
        run: |
          mkdir -p ~/.local/share/godot/export_templates/
          mv /root/.local/share/godot/export_templates/4.4.stable ~/.local/share/godot/export_templates/4.4.stable

      - name: Patch paths into preset and editor settings
        run: |
          # Find keystore and Java in the container
          KEYSTORE=$(find /root /home -name "debug.keystore" 2>/dev/null | head -1)
          echo "Keystore: $KEYSTORE"
          echo "JAVA_HOME: $JAVA_HOME"
          echo "ANDROID_SDK_ROOT: $ANDROID_SDK_ROOT"

          # Patch export_presets.cfg with keystore (overrides editor settings requirement)
          sed -i "s|keystore/debug=\"\"|keystore/debug=\"$KEYSTORE\"|" export_presets.cfg
          sed -i "s|keystore/debug_user=\"\"|keystore/debug_user=\"androiddebugkey\"|" export_presets.cfg
          sed -i "s|keystore/debug_password=\"\"|keystore/debug_password=\"android\"|" export_presets.cfg

          # Patch editor settings with Java SDK path
          SETTINGS=$(find /root/.config/godot -name "editor_settings-4*.tres" 2>/dev/null | head -1)
          if [ -n "$SETTINGS" ]; then
            sed -i '/export\/android\/java_sdk_path/d' "$SETTINGS"
            echo "export/android/java_sdk_path = \"$JAVA_HOME\"" >> "$SETTINGS"
            echo "export/android/android_sdk_path = \"$ANDROID_SDK_ROOT\"" >> "$SETTINGS"
            echo "Patched: $SETTINGS"
            cat "$SETTINGS"
          fi

          echo "--- Preset keystore lines ---"
          grep keystore export_presets.cfg

      - name: Export APK
        run: |
          mkdir -p builds
          godot --headless --export-debug "Android" builds/dungeoncrawler.apk 2>&1
          ls -lh builds/

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: dungeoncrawler-android-debug
          path: builds/dungeoncrawler.apk
          if-no-files-found: error
