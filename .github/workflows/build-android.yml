name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  export-android:
    name: Android Export
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.4

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup export templates
        run: |
          mkdir -p ~/.local/share/godot/export_templates/
          mv /root/.local/share/godot/export_templates/4.4.stable ~/.local/share/godot/export_templates/4.4.stable

      - name: Patch preset with known container paths
        run: |
          # These paths are fixed in barichello/godot-ci:4.4
          sed -i 's|keystore/debug=""|keystore/debug="/root/debug.keystore"|' export_presets.cfg
          sed -i 's|keystore/debug_user=""|keystore/debug_user="androiddebugkey"|' export_presets.cfg
          sed -i 's|keystore/debug_password=""|keystore/debug_password="android"|' export_presets.cfg
          echo "--- Preset keystore ---"
          grep keystore export_presets.cfg

      - name: Export APK
        run: |
          # Debug: find javac and check java paths
          which javac || true
          ls /usr/bin/javac || true
          ls /usr/lib/jvm/ || true
          python3 -c "
data = '[gd_resource type=\"EditorSettings\" format=3]\n[resource]\nexport/android/java_sdk_path = \"/usr\"\nexport/android/android_sdk_path = \"/usr/lib/android-sdk\"\nexport/android/debug_keystore = \"/root/debug.keystore\"\nexport/android/debug_keystore_user = \"androiddebugkey\"\nexport/android/debug_keystore_pass = \"android\"\n'
open('/root/.config/godot/editor_settings-4.4.tres', 'w').write(data)
print('Settings written')
print(open('/root/.config/godot/editor_settings-4.4.tres').read())
"
          mkdir -p builds
          godot --headless --export-debug "Android" builds/dungeoncrawler.apk 2>&1
          ls -lh builds/

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: dungeoncrawler-android-debug
          path: builds/dungeoncrawler.apk
          if-no-files-found: error
