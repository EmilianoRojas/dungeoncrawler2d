name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  export-android:
    name: Android Export
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.4

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup export templates
        run: |
          mkdir -p ~/.local/share/godot/export_templates/
          mv /root/.local/share/godot/export_templates/4.4.stable ~/.local/share/godot/export_templates/4.4.stable

      - name: Patch editor settings
        run: |
          SETTINGS=$(find /root/.config/godot -name "editor_settings-4*.tres" 2>/dev/null | head -1)
          echo "Found settings: $SETTINGS"
          cat "$SETTINGS"
          echo "---"
          echo "JAVA_HOME=$JAVA_HOME"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          echo "ANDROID_HOME=$ANDROID_HOME"
          find /root -name "debug.keystore" 2>/dev/null
          find /usr -name "debug.keystore" 2>/dev/null

      - name: Export APK
        run: |
          mkdir -p builds
          godot --headless --export-debug "Android" builds/dungeoncrawler.apk 2>&1
          ls -lh builds/

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: dungeoncrawler-android-debug
          path: builds/dungeoncrawler.apk
          if-no-files-found: error
