name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  export-android:
    name: Android Export
    runs-on: ubuntu-latest
    # No container — full control over the environment

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android components
        run: |
          sdkmanager --install "build-tools;34.0.0" "platforms;android-34" "platform-tools" 2>&1 | tail -3
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"

      - name: Generate debug keystore
        run: |
          keytool -genkey -v -keystore "$HOME/debug.keystore" \
            -alias androiddebugkey -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=Android Debug,O=Android,C=US" 2>&1
          ls -lh "$HOME/debug.keystore"

      - name: Install Godot 4.4 headless
        run: |
          wget -q "https://github.com/godotengine/godot-builds/releases/download/4.4-stable/Godot_v4.4-stable_linux.x86_64.zip" -O /tmp/godot.zip
          unzip -q /tmp/godot.zip -d /tmp/
          sudo mv "/tmp/Godot_v4.4-stable_linux.x86_64" /usr/local/bin/godot
          sudo chmod +x /usr/local/bin/godot
          godot --version

      - name: Install Godot Android export templates
        run: |
          mkdir -p "$HOME/.local/share/godot/export_templates/4.4.stable/"
          wget -q "https://github.com/godotengine/godot-builds/releases/download/4.4-stable/Godot_v4.4-stable_export_templates.tpz" -O /tmp/templates.tpz
          unzip -q /tmp/templates.tpz -d /tmp/godot_templates/
          mv /tmp/godot_templates/templates/* "$HOME/.local/share/godot/export_templates/4.4.stable/"
          echo "4.4.stable" > "$HOME/.local/share/godot/export_templates/4.4.stable/version.txt"
          echo "=== Android templates ==="
          ls "$HOME/.local/share/godot/export_templates/4.4.stable/" | grep android

      - name: Configure Godot editor settings
        run: |
          mkdir -p "$HOME/.config/godot"
          cat > "$HOME/.config/godot/editor_settings-4.4.tres" << EOF
          [gd_resource type="EditorSettings" format=3]
          [resource]
          export/android/java_sdk_path = "$JAVA_HOME"
          export/android/android_sdk_path = "$ANDROID_SDK_ROOT"
          export/android/debug_keystore = "$HOME/debug.keystore"
          export/android/debug_keystore_user = "androiddebugkey"
          export/android/debug_keystore_pass = "android"
          EOF
          cat "$HOME/.config/godot/editor_settings-4.4.tres"

      - name: Patch export preset keystore
        run: |
          KEYSTORE_PATH="$HOME/debug.keystore"
          sed -i "s|keystore/debug=\"\"|keystore/debug=\"$KEYSTORE_PATH\"|" export_presets.cfg
          sed -i 's|keystore/debug_user=""|keystore/debug_user="androiddebugkey"|' export_presets.cfg
          sed -i 's|keystore/debug_password=""|keystore/debug_password="android"|' export_presets.cfg
          grep keystore export_presets.cfg

      - name: Smoke test with minimal project
        run: |
          mkdir -p /tmp/testproject
          cat > /tmp/testproject/project.godot << 'EOF'
          [gd_resource type="Resource" load_steps=1 format=3]
          [resource]
          config_version=5
          [application]
          config/name="Test"
          config/features=PackedStringArray("4.4", "GL Compatibility")
          [rendering]
          renderer/rendering_method="gl_compatibility"
          renderer/rendering_method.mobile="gl_compatibility"
          EOF
          cat > /tmp/testproject/export_presets.cfg << EOF
          [preset.0]
          name="Android"
          platform="Android"
          runnable=true
          export_filter="all_resources"
          export_path="/tmp/test.apk"
          [preset.0.options]
          package/unique_name="com.test.minimal"
          keystore/debug="$HOME/debug.keystore"
          keystore/debug_user="androiddebugkey"
          keystore/debug_password="android"
          EOF
          echo "=== Minimal project export ==="
          cd /tmp/testproject
          godot --headless --path /tmp/testproject --export-debug "Android" /tmp/test.apk 2>&1 | grep -v "not exposed, skipping" || true
          ls -lh /tmp/test.apk 2>/dev/null && echo "MINIMAL EXPORT SUCCEEDED" || echo "MINIMAL EXPORT FAILED"

      - name: Export APK
        run: |
          mkdir -p builds
          godot --headless --verbose --export-debug "Android" builds/dungeoncrawler.apk 2>&1 | grep -v "not exposed, skipping"
          echo "--- Build result ---"
          ls -lh builds/
          test -f builds/dungeoncrawler.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: dungeoncrawler-android-debug
          path: builds/dungeoncrawler.apk
          if-no-files-found: error
