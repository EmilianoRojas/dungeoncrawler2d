name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  export-android:
    name: Android Export
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.4

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Patch preset keystore
        run: |
          sed -i 's|keystore/debug=""|keystore/debug="/root/debug.keystore"|' export_presets.cfg
          sed -i 's|keystore/debug_user=""|keystore/debug_user="androiddebugkey"|' export_presets.cfg
          sed -i 's|keystore/debug_password=""|keystore/debug_password="android"|' export_presets.cfg
          grep keystore export_presets.cfg

      - name: Install Android build tools and platform
        run: |
          yes | /usr/lib/android-sdk/cmdline-tools/latest/bin/sdkmanager "build-tools;34.0.0" "platforms;android-34" 2>&1 | tail -3

      - name: Export APK (HOME=/root so Godot uses container config directly)
        env:
          HOME: /root
          JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64
          ANDROID_HOME: /usr/lib/android-sdk
        run: |
          mkdir -p builds
          echo "=== Using HOME=$HOME ==="
          ls /root/.config/godot/
          ls /root/.local/share/godot/export_templates/4.4.stable/ | head -5
          godot --headless --verbose --export-debug "Android" builds/dungeoncrawler.apk 2>&1 | grep -v "not exposed, skipping" | tee /tmp/export_log.txt || true
          echo "--- Exit check ---"
          ls -lh builds/ 2>/dev/null || echo "builds/ empty"
          test -f builds/dungeoncrawler.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: dungeoncrawler-android-debug
          path: builds/dungeoncrawler.apk
          if-no-files-found: error
