name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  export-android:
    name: Android Export
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.4

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup export templates
        run: |
          mkdir -p ~/.local/share/godot/export_templates/
          mv /root/.local/share/godot/export_templates/4.4.stable ~/.local/share/godot/export_templates/4.4.stable

      - name: Patch preset with known container paths
        run: |
          # These paths are fixed in barichello/godot-ci:4.4
          sed -i 's|keystore/debug=""|keystore/debug="/root/debug.keystore"|' export_presets.cfg
          sed -i 's|keystore/debug_user=""|keystore/debug_user="androiddebugkey"|' export_presets.cfg
          sed -i 's|keystore/debug_password=""|keystore/debug_password="android"|' export_presets.cfg
          echo "--- Preset keystore ---"
          grep keystore export_presets.cfg

      - name: Find Java and Android paths
        run: |
          echo "=== JVM dirs ==="
          find /usr/lib/jvm -maxdepth 1 -type d 2>/dev/null || echo "none"
          echo "=== which java/javac/jarsigner ==="
          which java || true
          which javac || true
          which jarsigner || true
          echo "=== Android SDK ==="
          ls /usr/lib/android-sdk/ 2>/dev/null || echo "none at /usr/lib/android-sdk"
          ls /opt/android-sdk/ 2>/dev/null || echo "none at /opt/android-sdk"
          echo "=== Keystore ==="
          find / -name "debug.keystore" 2>/dev/null | head -5

      - name: Export APK
        env:
          XDG_CONFIG_HOME: /tmp/godot-config
        run: |
          JAVA_SDK=$(find /usr/lib/jvm -maxdepth 1 -mindepth 1 -type d | grep -v "^/usr/lib/jvm/default" | head -1)
          echo "Using Java SDK: $JAVA_SDK"
          mkdir -p /tmp/godot-config/godot
          {
            echo '[gd_resource type="EditorSettings" format=3]'
            echo '[resource]'
            echo "export/android/java_sdk_path = \"$JAVA_SDK\""
            echo 'export/android/android_sdk_path = "/usr/lib/android-sdk"'
            echo 'export/android/debug_keystore = "/root/debug.keystore"'
            echo 'export/android/debug_keystore_user = "androiddebugkey"'
            echo 'export/android/debug_keystore_pass = "android"'
          } > /tmp/godot-config/godot/editor_settings-4.4.tres
          cat /tmp/godot-config/godot/editor_settings-4.4.tres
          mkdir -p builds
          godot --headless --export-debug "Android" builds/dungeoncrawler.apk 2>&1
          ls -lh builds/

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: dungeoncrawler-android-debug
          path: builds/dungeoncrawler.apk
          if-no-files-found: error
