name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  export-android:
    name: Android Export
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.4

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Godot config and templates for CI home
        run: |
          echo "HOME=$HOME"
          # Copy container's pre-configured editor settings to the actual HOME
          mkdir -p $HOME/.config/godot
          cp /root/.config/godot/editor_settings-4.4.tres $HOME/.config/godot/editor_settings-4.4.tres
          echo "--- Settings copied ---"
          cat $HOME/.config/godot/editor_settings-4.4.tres
          # Move templates to HOME so Godot finds them
          mkdir -p $HOME/.local/share/godot/export_templates/
          mv /root/.local/share/godot/export_templates/4.4.stable $HOME/.local/share/godot/export_templates/4.4.stable
          echo "--- Templates ---"
          ls $HOME/.local/share/godot/export_templates/4.4.stable/ | grep android

      - name: Patch preset with container keystore
        run: |
          sed -i 's|keystore/debug=""|keystore/debug="/root/debug.keystore"|' export_presets.cfg
          sed -i 's|keystore/debug_user=""|keystore/debug_user="androiddebugkey"|' export_presets.cfg
          sed -i 's|keystore/debug_password=""|keystore/debug_password="android"|' export_presets.cfg
          grep keystore export_presets.cfg

      - name: Install Android build tools and platform
        run: |
          yes | /usr/lib/android-sdk/cmdline-tools/latest/bin/sdkmanager "build-tools;34.0.0" "platforms;android-34" 2>&1 | tail -3

      - name: Export APK
        env:
          JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64
          ANDROID_HOME: /usr/lib/android-sdk
          ANDROID_NDK_HOME: /usr/lib/android-sdk/ndk/25.2.9519653
        run: |
          mkdir -p builds
          # Run with verbose but filter out the noisy "not exposed" lines
          godot --headless --verbose --export-debug "Android" builds/dungeoncrawler.apk 2>&1 | grep -v "not exposed, skipping"
          echo "--- Build result ---"
          ls -lh builds/ 2>/dev/null || echo "builds/ is empty or missing"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: dungeoncrawler-android-debug
          path: builds/dungeoncrawler.apk
          if-no-files-found: error
